name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-build:
    name: Go Backend CI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build and Test Backend
      working-directory: ./backend
      run: |
        go mod tidy
        go build -v ./...
        go test -v ./...

  lambda-build:
    name: Go Lambda CI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build and Test Lambda
      working-directory: ./lambda
      run: |
        go mod tidy
        go build -v ./...
        go test -v ./...

  frontend-build:
    name: Vue Frontend CI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Type Check & Build
      working-directory: ./frontend
      run: |
        npm run build
