name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Needed for writing signatures and commenting on PRs
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' || github.event_name == 'pull_request_target')
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: '.github/cla-signatures.json'
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'bot*,dependabot*,github-actions*'

          custom-notsigned-prcomment: |
            ## Contributor License Agreement (CLA)

            Thank you for your contribution to **Serverless Orchestrator**! 🎉

            Before we can merge this PR, you must agree to our [Contributor License Agreement (CLA)](https://github.com/${{ github.repository }}/blob/main/CLA.md).

            This confirms that:
            - Your contribution is voluntary
            - All intellectual property rights are assigned to **VectorSight Technologies**
            - You retain no ownership claims over the contribution

            ---

            **To sign the CLA**, please reply to this comment with exactly:

            > I have read the CLA Document and I hereby sign the CLA

            You only need to sign once — future PRs will pass automatically.

          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'

          custom-allsigned-prcomment: |
            ✅ All contributors have signed the CLA. Thank you!
