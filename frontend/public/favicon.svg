<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#162032" rx="14"/>
  <!-- Heartbeat pulse (crossing through) -->
  <polyline
    points="2,32 14,32 17,22 20,40 23,16 26,44 29,32 62,32"
    fill="none"
    stroke="#1CE783"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.8"
  />
  <!-- λ shape -->
  <!-- Left leg -->
  <line x1="26" y1="10" x2="16" y2="54" stroke="#1CE783" stroke-width="6" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="26" y1="10" x2="48" y2="54" stroke="#1CE783" stroke-width="6" stroke-linecap="round"/>
  <!-- Knee crossbar -->
  <line x1="20" y1="33" x2="30" y2="33" stroke="#1CE783" stroke-width="5" stroke-linecap="round"/>
  <!-- Circuit dots -->
  <circle cx="26" cy="10" r="3.5" fill="#1CE783"/>
  <circle cx="16" cy="54" r="3.5" fill="#1CE783"/>
  <circle cx="48" cy="54" r="3.5" fill="#1CE783"/>
</svg>
